server:
  port: 7003
  servlet:
    context-path: /

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/vote_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: vote
    password: vote123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

# 文件存储路径（可按需修改）
app:
  upload-dir: ./uploads
  base-url: http://localhost:7003
  # [P0修复] 应参与投票的委员总数（设为0则自动取历史最大投票人数）
  total-voters: 0
  # [P2修复] CORS 允许的来源（逗号分隔），留空则使用默认值 localhost:3000,localhost:8080
  cors:
    allowed-origins:
