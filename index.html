<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>科技奖评审表决系统</title>
  <link rel="stylesheet" href="chunk-vendors.7eec43d6.css">
  <link rel="stylesheet" href="app.5007c485.css">
  <script src="options.js"></script>
  <style>
    .import-float-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 14px rgba(34,197,94,0.4);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .import-float-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,197,94,0.5); }

    /* 批量删除条按钮 */
    #batch-bar button {
      background: #fff; color: #ef4444; border: none;
      padding: 4px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #batch-bar button:hover { background: #fde8e8; }
    #batch-bar button + button {
      background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.6);
      margin-left: 8px; font-size: 12px;
    }
    #batch-bar button + button:hover { background: rgba(255,255,255,0.15); }

    /* 表头+数据居中（操作列除外） */
    .el-table th .cell { text-align: center !important; }
    .el-table__body-wrapper td .cell { text-align: center !important; }
    .el-table__body-wrapper td:last-child .cell { text-align: left !important; }
  </style>
</head>
<body>
  <div id="app"></div>
  <a href="import.html" class="import-float-btn" title="批量导入成果">📊 导入数据</a>
  <script src="chunk-vendors.e58ab867.js"></script>
  <script src="app.b1193a83.js"></script>
  <script src="pdf-inject.js"></script>
  <script src="hide-time-col.js"></script>
  <script src="batch-delete.js"></script>
  <script src="expert-column.js"></script>
  <script src="inline-import.js"></script>
</body>
</html>
