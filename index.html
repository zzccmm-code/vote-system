<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <title>科技奖评审表决系统</title>
  <link rel="stylesheet" href="chunk-vendors.7eec43d6.css">
  <link rel="stylesheet" href="app.5007c485.css">
  <script src="options.js"></script>
  <style>
    /* 全局标题栏 - 科技风格 */
    .global-header {
      background: linear-gradient(135deg, #0a1628 0%, #0d2137 40%, #0f2b4a 100%);
      padding: 10px 24px;
      display: flex; align-items: center; justify-content: center;
      border-bottom: 2px solid #1e88e5;
      position: relative; overflow: hidden;
    }
    .global-header::before {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, #42a5f5, #1e88e5, #42a5f5, transparent);
    }
    .global-header::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(30,136,229,0.3), transparent);
    }
    .global-header h1 {
      color: #e3f2fd; font-size: 18px; font-weight: 600;
      letter-spacing: 2px; margin: 0;
      text-shadow: 0 0 20px rgba(30,136,229,0.4);
    }

    /* 导入数据浮动按钮 */
    .import-float-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 9999;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px 20px; font-size: 14px; font-weight: 600;
      cursor: pointer; box-shadow: 0 4px 14px rgba(34,197,94,0.4);
      text-decoration: none; display: flex; align-items: center; gap: 8px;
      transition: all 0.2s;
    }
    .import-float-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34,197,94,0.5); }

    /* 批量删除条按钮 */
    #batch-bar button {
      background: #fff; color: #ef4444; border: none;
      padding: 4px 14px; border-radius: 4px; font-size: 13px; font-weight: 600; cursor: pointer;
    }
    #batch-bar button:hover { background: #fde8e8; }
    #batch-bar button + button {
      background: transparent; color: #fff; border: 1px solid rgba(255,255,255,0.6);
      margin-left: 8px; font-size: 12px;
    }
    #batch-bar button + button:hover { background: rgba(255,255,255,0.15); }

    /* 表头+数据居中 + 勾选框flex居中 + 操作列按钮并排 */
    .el-table th .cell { text-align: center !important; }
    .el-table__body-wrapper td .cell { text-align: center !important; }
    .el-table__body-wrapper td:last-child .cell {
      display: flex !important; flex-wrap: wrap !important;
      align-items: center !important; justify-content: center !important;
      gap: 4px !important; text-align: center !important;
    }
    .wb-cb-th, .wb-cb-cell { display: flex !important; align-items: center !important; justify-content: center !important; }

    /* 工具栏紧凑布局 */
    .el-button--small { min-width: auto !important; padding: 7px 12px !important; font-size: 12px !important; }
  </style>
</head>
<body>
  <div class="global-header"><h1>国网四川省电力公司科技奖励评审系统</h1></div>
  <div id="app"></div>
  <a href="import.html" class="import-float-btn" title="批量导入成果">📊 导入数据</a>
  <script src="chunk-vendors.e58ab867.js"></script>
  <script src="app.b1193a83.js"></script>
  <script src="pdf-inject.js"></script>
  <script src="hide-time-col.js"></script>
  <script src="batch-delete.js"></script>
  <script src="expert-column.js"></script>
  <script src="inline-import.js"></script>
</body>
</html>
